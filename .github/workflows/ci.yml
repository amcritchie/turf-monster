name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          rubygems: 3.5.11
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          rubygems: 3.5.11
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          rubygems: 3.5.11
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest

    # MANAGED_WALLET_ENCRYPTION_KEY: throwaway value so the v2 managed-wallet
    #   encryptor has a non-empty key (KeyGenerator). NOT the OPSEC-015 prod key.
    # RAILS_MASTER_KEY: repo secret so credentials.secret_key_base decrypts —
    #   the LEGACY keypair encryptor reads secret_key_base[0,32] directly and
    #   raised "nil[]" without it (3 KeypairTest errors).
    # SOLANA_ADMIN_KEY: a THROWAWAY base58 keypair (NOT the prod Alex Bot
    #   signer). Solana::Keypair.admin raises "SOLANA_ADMIN_KEY env var
    #   required" when absent, erroring the 7 vault tests that build
    #   admin-signed TXs. No test asserts the pubkey, so any valid keypair
    #   clears them; secret-stored so the value never lands in the repo.
    env:
      MANAGED_WALLET_ENCRYPTION_KEY: ci-test-only-managed-wallet-key-not-a-real-secret
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      SOLANA_ADMIN_KEY: ${{ secrets.SOLANA_ADMIN_KEY }}

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y google-chrome-stable curl libjemalloc2 libvips postgresql-client

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          rubygems: 3.5.11
          bundler-cache: true

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          REDIS_URL: redis://localhost:6379/0
        run: bin/rails db:test:prepare test test:system

  playwright:
    runs-on: ubuntu-latest
    # Shard the single-worker E2E suite across N isolated jobs. In-process
    # Playwright workers are UNSAFE here: POST /test/reseed (TestController) is
    # a stop-the-world reset of the shared DB + Redis (wipes users id>5, resets
    # GeoSetting, clears rack-attack counters), so concurrent specs would
    # clobber each other. Every chromium spec runs `beforeEach(reseed)`, which
    # buys SERIAL independence, not parallel. So we parallelize at the only safe
    # boundary — a whole stack: each shard is a separate runner with its own
    # postgres+redis service + test server, no state shared across shards, and
    # the serial reseed-per-spec model preserved within each shard. ~Nx faster.
    # The `--shard` denominator is derived from `strategy.job-total`, so the
    # shard count lives in one place — this matrix list.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    # See the test job. Managed-wallet flows (signup) need the encryption
    # key; RAILS_MASTER_KEY lets credentials decrypt for the test server.
    # SOLANA_ADMIN_KEY (throwaway, see test job) — the test server boots the
    # app, and admin-signed Solana paths call Solana::Keypair.admin.
    env:
      MANAGED_WALLET_ENCRYPTION_KEY: ci-test-only-managed-wallet-key-not-a-real-secret
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      SOLANA_ADMIN_KEY: ${{ secrets.SOLANA_ADMIN_KEY }}
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: .ruby-version, rubygems: 3.5.11, bundler-cache: true }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Install Playwright + browsers
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Seed test DB
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          REDIS_URL: redis://localhost:6379/0
        run: bin/rails db:test:prepare && bin/rails runner -e test e2e/seed.rb
      # The test server (bin/rails server -e test, started by Playwright's
      # webServer) serves the compiled Tailwind stylesheet. Without this
      # build, app/assets/builds/tailwind.css is absent and every page 500s
      # ("asset tailwind.css is not present in the asset pipeline"), which
      # cascaded into 51/57 spec failures.
      - name: Build Tailwind CSS for the test server
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          REDIS_URL: redis://localhost:6379/0
        run: bin/rails tailwindcss:build
      - name: Run Playwright (excluding @devnet)
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          REDIS_URL: redis://localhost:6379/0
        # `strategy.job-total` is the matrix size, so the shard denominator
        # tracks the matrix automatically. Playwright shards by test; safe
        # because every spec is reseed-independent (no beforeAll state in the
        # chromium project — that lives only in the @devnet specs, which are
        # excluded here and run by devnet-nightly.yml).
        run: npm test -- --grep-invert "@devnet" --shard=${{ matrix.shard }}/${{ strategy.job-total }}
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          if-no-files-found: ignore

      # test-results/ holds the per-test traces + screenshots (use.trace /
      # use.screenshot). This is what lets us diagnose CI-only failures that
      # don't reproduce locally.
      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-shard-${{ matrix.shard }}
          path: test-results/
          if-no-files-found: ignore

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-shard-${{ matrix.shard }}
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore
