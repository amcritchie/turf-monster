name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          rubygems: 3.5.11
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          rubygems: 3.5.11
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          rubygems: 3.5.11
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest

    # MANAGED_WALLET_ENCRYPTION_KEY: throwaway value so the v2 managed-wallet
    #   encryptor has a non-empty key (KeyGenerator). NOT the OPSEC-015 prod key.
    # RAILS_MASTER_KEY: repo secret so credentials.secret_key_base decrypts —
    #   the LEGACY keypair encryptor reads secret_key_base[0,32] directly and
    #   raised "nil[]" without it (3 KeypairTest errors).
    # SOLANA_ADMIN_KEY: a THROWAWAY base58 keypair (NOT the prod Alex Bot
    #   signer). Solana::Keypair.admin raises "SOLANA_ADMIN_KEY env var
    #   required" when absent, erroring the 7 vault tests that build
    #   admin-signed TXs. No test asserts the pubkey, so any valid keypair
    #   clears them; secret-stored so the value never lands in the repo.
    env:
      MANAGED_WALLET_ENCRYPTION_KEY: ci-test-only-managed-wallet-key-not-a-real-secret
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      SOLANA_ADMIN_KEY: ${{ secrets.SOLANA_ADMIN_KEY }}

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y google-chrome-stable curl libjemalloc2 libvips postgresql-client

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          rubygems: 3.5.11
          bundler-cache: true

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          REDIS_URL: redis://localhost:6379/0
        run: bin/rails db:test:prepare test test:system

  playwright:
    runs-on: ubuntu-latest
    # Shard the single-worker E2E suite across N isolated jobs. In-process
    # Playwright workers are UNSAFE here: POST /test/reseed (TestController) is
    # a stop-the-world reset of the shared DB + Redis (wipes users id>5, resets
    # GeoSetting, clears rack-attack counters), so concurrent specs would
    # clobber each other. Every chromium spec runs `beforeEach(reseed)`, which
    # buys SERIAL independence, not parallel. So we parallelize at the only safe
    # boundary — a whole stack: each shard is a separate runner with its own
    # postgres+redis service + test server, no state shared across shards, and
    # the serial reseed-per-spec model preserved within each shard. ~Nx faster.
    # The `--shard` denominator is derived from `strategy.job-total`, so the
    # shard count lives in one place — this matrix list.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    # See the test job. Managed-wallet flows (signup) need the encryption
    # key; RAILS_MASTER_KEY lets credentials decrypt for the test server.
    # SOLANA_ADMIN_KEY (throwaway, see test job) — the test server boots the
    # app, and admin-signed Solana paths call Solana::Keypair.admin.
    # SOLANA_RPC_URL: black-hole loopback so the e2e stack is HERMETIC.
    #   Without it the test server defaults to public devnet
    #   (https://api.devnet.solana.com) and every authenticated HTML request
    #   blocks on live RPC (perform_solana_preload before_action; the test
    #   env's :null_store disables the 60s caches, so every request re-fires).
    #   At peak hours devnet throttles (429 + stalls), requests degrade to
    #   3-6s+, and the tightest post-click assertion window dies first —
    #   model_page.spec.js toHaveURL(5s) stuck on /admin/dashboard while
    #   GET /models/contest/random starves (trace: run 29254091915).
    #   Nothing listens on port 9, so connect fails instantly
    #   (Errno::ECONNREFUSED is not in the RPC client's retry set) and the
    #   app takes its designed nil-safe fallbacks.
    #
    #   COVERAGE, STATED HONESTLY: server-side on-chain paths are NOT
    #   exercised by any e2e that currently runs. This job excludes the
    #   @devnet specs (--grep-invert), and devnet-nightly.yml — the workflow
    #   that would run them — is DISABLED: it gates on
    #   `vars.DEVNET_NIGHTLY_ENABLED == 'true'`, and every scheduled run has
    #   completed `skipped`. It has never run. Do not read this pin as
    #   "covered elsewhere" — it is covered nowhere today.
    #
    #   WHY NO COVERAGE IS LOST — and it is a CONTINGENT reason, not a
    #   permanent one. After the async-navbar-balance change the preload
    #   fires exactly ONE server-side on-chain RPC for a wallet-connected
    #   user: Solana::Vault#list_entry_tokens (see :617 below /
    #   application_controller.rb) → getProgramAccounts(dataSize:124,
    #   memcmp@8=wallet) (vault.rb:1771-1786). Run against devnet for the e2e
    #   wallet (MOCK_PUBKEY_B58, 6ASf…pGWt) that returns [] — and NOT
    #   vacuously: the same program holds 72 entry-token accounts today, none
    #   of them owned by the mock wallet. So the count was 0 before this pin
    #   and rescues to 0 after it — the code path changes, the observable
    #   does not. Mint an entry token to that wallet on devnet and this
    #   premise EXPIRES.
    #
    #   Note what saves us: the preload NO LONGER fires get_balance / the
    #   USDC+seeds reads (:605-614). It does not follow that the e2e wallet
    #   is state-free — on devnet 6ASf…pGWt holds ~86 SOL in a real
    #   program-owned account. If the preload still read balances, the
    #   "nothing is lost" claim above would be flatly WRONG.
    #
    #   Browser-side RPC is separately mocked (e2e/rpc-mock.js).
    #
    #   A black hole simulates an ABSENT RPC, not a FLAKY one — ECONNREFUSED
    #   is never wrapped into Solana::Client::RpcError, so the app's
    #   RpcError-only fail-open rescues do NOT fire here. Nothing in this job
    #   proves the production RPC-flake fallbacks work.
    #
    #   TEST-ENV ONLY. Copying this URL into a non-test env KILLS BOOT:
    #   config/initializers/solana_network_alignment.rb rescues only
    #   Solana::Client::RpcError (:48), so ECONNREFUSED escapes. In CI we are
    #   saved by its `skip` (:21) — which is `Rails.env.test?` OR
    #   `SOLANA_SKIP_NETWORK_CHECK=true`; only the former applies here.
    #
    #   Pinned by test/lib/ci_playwright_hermetic_test.rb.
    env:
      MANAGED_WALLET_ENCRYPTION_KEY: ci-test-only-managed-wallet-key-not-a-real-secret
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      SOLANA_ADMIN_KEY: ${{ secrets.SOLANA_ADMIN_KEY }}
      SOLANA_RPC_URL: http://127.0.0.1:9
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: .ruby-version, rubygems: 3.5.11, bundler-cache: true }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Install Playwright + browsers
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Seed test DB
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          REDIS_URL: redis://localhost:6379/0
        run: bin/rails db:test:prepare && bin/rails runner -e test e2e/seed.rb
      # The test server (bin/rails server -e test, started by Playwright's
      # webServer) serves the compiled Tailwind stylesheet. Without this
      # build, app/assets/builds/tailwind.css is absent and every page 500s
      # ("asset tailwind.css is not present in the asset pipeline"), which
      # cascaded into 51/57 spec failures.
      - name: Build Tailwind CSS for the test server
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          REDIS_URL: redis://localhost:6379/0
        run: bin/rails tailwindcss:build
      - name: Run Playwright (excluding @devnet)
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          REDIS_URL: redis://localhost:6379/0
        # `strategy.job-total` is the matrix size, so the shard denominator
        # tracks the matrix automatically. Playwright shards by test; safe
        # because every spec is reseed-independent (no beforeAll state in the
        # chromium project — that lives only in the @devnet specs, which are
        # excluded here and run by devnet-nightly.yml).
        run: npm test -- --grep-invert "@devnet" --shard=${{ matrix.shard }}/${{ strategy.job-total }}
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          if-no-files-found: ignore

      # test-results/ holds the per-test traces + screenshots (use.trace /
      # use.screenshot). This is what lets us diagnose CI-only failures that
      # don't reproduce locally.
      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-shard-${{ matrix.shard }}
          path: test-results/
          if-no-files-found: ignore

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-shard-${{ matrix.shard }}
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore
