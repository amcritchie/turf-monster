# Scheduled jobs run via sidekiq-cron. Loaded by config/initializers/sidekiq_cron.rb.
# Cron syntax: minute hour day month weekday (Sidekiq-cron uses Fugit/standard cron).
#
# To add a job:
#   1. Add an entry below
#   2. Restart Sidekiq (or hit the Sidekiq web UI's Cron page → load schedule)
#   3. Verify it appears in /admin/jobs → Cron Jobs

# solana_reconcile cron removed 2026-05-19 (OPSEC-040). The scheduled job
# was generating noise (every signed-up-but-never-deposited user appears as
# :missing_onchain_account under lazy ATA per OPSEC-044). Ad-hoc reconciliation
# is still available via `bin/rails solana:reconcile` and
# `bin/rails solana:reconcile_contest CONTEST=<slug>` — Solana::Reconciler
# service kept for that purpose.

outbound_request_sweeper:
  cron: "17 4 * * *"     # daily at 04:17 UTC (off-peak)
  class: OutboundRequestSweeperJob
  description: Trim outbound_requests audit table. Successful rows kept 90 days, failed rows 180 days.
  queue: default

pending_transaction_sweeper:
  cron: "23 4 * * *"     # daily at 04:23 UTC (off-peak, offset from outbound_request_sweeper)
  class: PendingTransactionSweeperJob
  description: Flip stale entry-flow PendingTransactions (pending/submitted older than 1h) to failed so admin reports surface real backlogs only.
  queue: default
